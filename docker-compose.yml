version: "3.8"

services:
  nacos:
    image: nacos/nacos-server:v2.2.0-slim
    container_name: xc-nacos
    restart: unless-stopped
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - JVM_XMS=256m
      - JVM_XMX=512m
      - TIME_ZONE=Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - C:/docker-data/nacos-logs:/home/nacos/logs

  rabbitmq:
    image: rabbitmq:3.10-management
    container_name: xc-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - C:/docker-data/rabbitmq:/var/lib/rabbitmq

  elasticsearch:
    image: elasticsearch:7.12.1
    container_name: xc-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - TZ=Asia/Shanghai
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - C:/docker-data/es/data:/usr/share/elasticsearch/data
      - C:/docker-data/es/logs:/usr/share/elasticsearch/logs
      - C:/docker-data/es/plugins:/usr/share/elasticsearch/plugins

  kibana:
    image: kibana:7.12.1
    container_name: xc-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - I18N_LOCALE=zh-CN
    ports:
      - "5601:5601"

  minio:
    image: minio/minio:RELEASE.2023-02-27T18-10-45Z
    container_name: xc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - C:/docker-data/minio:/data

  xxljob:
    image: xuxueli/xxl-job-admin:2.3.1
    container_name: xc-xxljob
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PARAMS=--spring.datasource.url=jdbc:mysql://host.docker.internal:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
             --spring.datasource.username=root
             --spring.datasource.password=123456
    ports:
      - "8088:8080"

  portal:
    build:
      context: ./project-xczx2-portal-vue-ts
      dockerfile: Dockerfile
    image: xc-portal:dev
    container_name: xc-portal
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8601:80"
    volumes:
      - ./portal-vue-dist:/usr/share/nginx/html:ro

  portal-home:
    image: nginx:alpine
    container_name: xc-portal-home
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    volumes:
      - ./portal-static/xc-ui-pc-static-portal:/usr/share/nginx/html:ro
      - ./nginx-portal-home.conf:/etc/nginx/conf.d/default.conf:ro
