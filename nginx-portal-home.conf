server {
    listen 80 default_server;
    server_name www.51xuecheng.cn localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    ssi on;
    ssi_silent_errors on;
    ssi_types text/shtml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        alias /usr/share/nginx/html/;
    }

    # 课程详情静态化页：从 MinIO 拉 mediafiles/course/{id}.html
    location ~ ^/course/(\d+)\.html$ {
        proxy_pass http://minio:9000/mediafiles/course/$1.html;
        proxy_set_header Host $host;
    }

    # 教师预览模式："马上学习"跳转的伪路径，rewrite 到真实学习页
    location = /course/preview/learning.html {
        rewrite ^ /course/learning.html last;
    }

    location ^~ /api/ {
        proxy_pass http://host.docker.internal:63010/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }
}
